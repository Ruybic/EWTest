<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Mini App</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --accent: #58a6ff; --text: #c9d1d9; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; transition: opacity 0.3s; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer; animation: fadeIn 0.5s ease; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 10px; font-size: 0.9rem; text-align: center; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #reader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); overflow-y: auto; z-index: 100; padding: 20px; }
        .back-btn { background: var(--accent); border: none; color: white; padding: 10px; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="home">
        <h2>Recommended Manga</h2>
        <div id="manga-grid" class="grid"></div>
    </div>

    <div id="reader">
        <button class="back-btn" onclick="closeReader()">← Back</button>
        <div id="chapter-list"></div>
    </div>

    <script>
        async function loadManga() {
            const res = await fetch('./manga_data.json');
            const data = await res.json();
            const grid = document.getElementById('manga-grid');
            
            data.forEach(manga => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openReader(manga.id);
                card.innerHTML = `
                    <img src="${manga.cover}" alt="cover">
                    <div class="card-info">${manga.title}</div>
                `;
                grid.appendChild(card);
            });
        }

        async function openReader(mangaId) {
            document.getElementById('home').style.opacity = '0.3';
            const reader = document.getElementById('reader');
            const list = document.getElementById('chapter-list');
            reader.style.display = 'block';
            list.innerHTML = 'Loading Chapters...';

            const res = await fetch(`https://api.mangadex.org/manga/${mangaId}/feed?translatedLanguage[]=en&order[chapter]=desc&limit=50`);
            const chapters = await res.json();

            list.innerHTML = `<h3>Chapters</h3>`;
            chapters.data.forEach(ch => {
                const btn = document.createElement('div');
                btn.style = "padding:15px; border-bottom:1px solid #333";
                btn.innerText = `Chapter ${ch.attributes.chapter}: ${ch.attributes.title || 'Untitled'}`;
                list.appendChild(btn);
            });
        }

        function closeReader() {
            document.getElementById('reader').style.display = 'none';
            document.getElementById('home').style.opacity = '1';
        }

        loadManga();
    </script>
</body>
</html>
